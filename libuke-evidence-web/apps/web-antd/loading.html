<style data-app-loading="inject-css">
  html {
    line-height: 1.15;
  }

  .loading {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f6f9fc;
  }

  .loading.hidden {
    visibility: hidden;
    pointer-events: none;
    opacity: 0;
    transition: all 0.8s ease-out;
  }

  .dark .loading {
    background: #0d1117;
  }

  .loading-logo {
    width: 72px;
    height: 72px;
    object-fit: contain;
    animation: logo-pulse 1.2s ease-in-out infinite;
  }

  .title {
    margin-top: 24px;
    font-size: 28px;
    font-weight: 700;
    color: #0f172a;
  }

  .subtitle {
    margin-top: 10px;
    font-size: 14px;
    color: #64748b;
  }

  .dark .title {
    color: #f8fafc;
  }

  .dark .subtitle {
    color: #94a3b8;
  }

  @keyframes logo-pulse {
    0%,
    100% {
      opacity: 0.92;
      transform: scale(1);
    }

    50% {
      opacity: 1;
      transform: scale(1.04);
    }
  }
</style>
<div class="loading" id="__app-loading__">
  <img class="loading-logo" src="/linyingtai-logo.png" alt="邻应台" />
  <div class="title">邻应台物业工作台</div>
  <div class="subtitle">小区问题上报与物业处理平台</div>
</div>
