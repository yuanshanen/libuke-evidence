services:
  libuke-evidence-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libuke-evidence-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - ./logs:/app/logs